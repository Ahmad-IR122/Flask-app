{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}New Post{% endblock %}</h1>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow p-4">
        <form method="post">

            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input
                    type="text"
                    class="form-control"
                    name="title"
                    id="title"
                    value="{{ request.form['title'] }}"
                    required>
            </div>

            <div class="mb-3">
                <label for="body" class="form-label">Body</label>
                <textarea
                    class="form-control"
                    name="body"
                    id="body"
                    rows="6">{{ request.form['body'] }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Save Post
            </button>

        </form>
    </div>
</div>
{% endblock %}
